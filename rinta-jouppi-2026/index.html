<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rinta Jouppi — Phyron Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#0d0d0d">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;
    const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    const ORANGE = "#E8510A";
    const TEAL = "#0BA187";

    const allMonths = [
      { m:"Apr 25", views:161205, hours:110.7, avgTime:80, clicks:885,  shares:326, leads:67  },
      { m:"May 25", views:173164, hours:117.2, avgTime:80, clicks:1142, shares:329, leads:78  },
      { m:"Jun 25", views:170445, hours:112.2, avgTime:80, clicks:1172, shares:368, leads:104 },
      { m:"Jul 25", views:126161, hours:115.7, avgTime:80, clicks:1329, shares:366, leads:116 },
      { m:"Aug 25", views:159721, hours:103.9, avgTime:80, clicks:1165, shares:275, leads:63  },
      { m:"Sep 25", views:133621, hours:92.7,  avgTime:80, clicks:1072, shares:324, leads:61  },
      { m:"Oct 25", views:224165, hours:85.3,  avgTime:80, clicks:1433, shares:230, leads:57  },
      { m:"Nov 25", views:230442, hours:116.4, avgTime:80, clicks:1400, shares:287, leads:68  },
      { m:"Dec 25", views:230000, hours:113.7, avgTime:80, clicks:1785, shares:365, leads:66  },
      { m:"Jan 26", views:11405,  hours:109.7, avgTime:80, clicks:1793, shares:387, leads:76  },
      { m:"Feb 26", views:11405,  hours:109.7, avgTime:80, clicks:1785, shares:359, leads:78  },
      { m:"Mar 26", views:11405,  hours:114.1, avgTime:80, clicks:1769, shares:377, leads:81  },
      { m:"Apr 26", views:12047,  hours:114,   avgTime:80, clicks:1769, shares:377, leads:81  },
    ];

    const heatViews = {
      days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
      rows: [
        { label:"Morning", sub:"6AM–12PM", data:[390,375,476,417,333,486,503] },
        { label:"Afternoon", sub:"12PM–6PM", data:[640,587,680,657,440,561,572] },
        { label:"Evening", sub:"6PM–12AM", data:[597,600,727,652,516,574,606] },
        { label:"Night", sub:"12AM–6AM", data:[92,93,120,103,69,86,95] },
      ]
    };

    const heatLeads = {
      days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
      rows: [
        { label:"Morning", sub:"6AM–12PM", data:[2,2,5,0,4,9,3] },
        { label:"Afternoon", sub:"12PM–6PM", data:[2,7,5,6,1,10,3] },
        { label:"Evening", sub:"6PM–12AM", data:[4,0,6,3,1,3,0] },
        { label:"Night", sub:"12AM–6AM", data:[0,1,1,2,0,1,0] },
      ]
    };

    const TT = ({ active, payload, label }) => {
      if (!active || !payload || !payload.length) return null;
      return (
        React.createElement('div', { style:{ background:"#1a1a1a", border:`0.5px solid ${ORANGE}55`, borderRadius:6, padding:"8px 12px", fontSize:12, color:"#fff" } },
          React.createElement('div', { style:{ fontWeight:500, marginBottom:4 } }, label),
          payload.map((p,i) => React.createElement('div', { key:i, style:{ color:p.color } }, `${p.name}: `, React.createElement('b', null, typeof p.value==="number"&&p.value>999?p.value.toLocaleString():p.value)))
        )
      );
    };

    function Heatmap({ data, color }) {
      const max = Math.max(...data.rows.flatMap(r=>r.data));
      return React.createElement('div', { style:{ overflowX:"auto" } },
        React.createElement('table', { style:{ width:"100%", borderCollapse:"separate", borderSpacing:3, fontSize:11 } },
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', { style:{ width:90, textAlign:"left", color:"#888", fontWeight:400, paddingBottom:4 } }),
              ...data.days.map(d => React.createElement('th', { key:d, style:{ color:"#888", fontWeight:400, paddingBottom:4 } }, d))
            )
          ),
          React.createElement('tbody', null,
            data.rows.map((r,ri) =>
              React.createElement('tr', { key:ri },
                React.createElement('td', { style:{ paddingRight:8, lineHeight:1.3 } },
                  React.createElement('div', { style:{ fontSize:11, color:"#ccc" } }, r.label),
                  React.createElement('div', { style:{ fontSize:10, color:"#666" } }, r.sub)
                ),
                ...r.data.map((v,ci) => {
                  const intensity = v/max;
                  const bg = color==="orange" ? `rgba(232,81,10,${0.08+intensity*0.82})` : `rgba(11,161,135,${0.08+intensity*0.82})`;
                  return React.createElement('td', { key:ci, style:{ padding:"10px 4px", textAlign:"center", background:bg, borderRadius:4, fontWeight:500, color:intensity>0.45?"#fff":"#aaa", fontSize:11 } }, v);
                })
              )
            )
          )
        )
      );
    }

    const MONTH_OPTIONS = ["Show all", ...allMonths.map(m=>m.m)];

    function Dashboard() {
      const [filter, setFilter] = useState("Show all");

      const filtered = useMemo(() => {
        if (filter === "Show all") return allMonths;
        const idx = allMonths.findIndex(m=>m.m===filter);
        return idx >= 0 ? allMonths.slice(0, idx+1) : allMonths;
      }, [filter]);

      const totalViews = filtered.reduce((s,d)=>s+d.views,0);
      const avgViews = Math.round(totalViews/filtered.length);
      const totalHours = filtered.reduce((s,d)=>s+d.hours,0).toFixed(0);
      const totalClicks = filtered.reduce((s,d)=>s+d.clicks,0);

      const card = (label, value, sub) => React.createElement('div', {
        style:{ background:"#1a1a1a", border:"0.5px solid #2a2a2a", borderRadius:10, padding:"1rem", borderTop:`2px solid ${ORANGE}` }
      },
        React.createElement('div', { style:{ fontSize:11, color:"#777", marginBottom:4 } }, label),
        React.createElement('div', { style:{ fontSize:22, fontWeight:600, color:"#fff" } }, value),
        React.createElement('div', { style:{ fontSize:10, color:TEAL, marginTop:3 } }, sub)
      );

      const chartBox = (title, sub, children) => React.createElement('div', {
        style:{ background:"#1a1a1a", border:"0.5px solid #2a2a2a", borderRadius:10, padding:"1rem" }
      },
        React.createElement('div', { style:{ fontSize:13, fontWeight:500, marginBottom:2, color:"#fff" } }, title),
        React.createElement('div', { style:{ fontSize:11, color:"#666", marginBottom:10 } }, sub),
        children
      );

      return React.createElement('div', { style:{ background:"#0d0d0d", minHeight:"100vh", color:"#fff", fontFamily:"system-ui,sans-serif", padding:"1.5rem 1.25rem" } },

        // Header
        React.createElement('div', { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"1.5rem", flexWrap:"wrap", gap:12 } },
          React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:12 } },
            React.createElement('div', { style:{ background:ORANGE, borderRadius:6, padding:"4px 10px", fontSize:13, fontWeight:700, color:"#fff", letterSpacing:1 } }, "PHYRON"),
            React.createElement('div', null,
              React.createElement('div', { style:{ fontSize:16, fontWeight:600 } }, "Rinta Jouppi"),
              React.createElement('div', { style:{ fontSize:12, color:"#777" } }, "Campaign Report · Apr 2025 – Apr 2026")
            )
          ),
          React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:8, fontSize:12 } },
            React.createElement('span', { style:{ color:"#777" } }, "Filter by month"),
            React.createElement('select', { value:filter, onChange:e=>setFilter(e.target.value), style:{ background:"#1a1a1a", color:"#fff", border:"0.5px solid #333", borderRadius:6, padding:"5px 10px", fontSize:12 } },
              MONTH_OPTIONS.map(m => React.createElement('option', { key:m }, m))
            )
          )
        ),

        // KPIs
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:10, marginBottom:"1.75rem" } },
          card("Total video views", totalViews.toLocaleString(), "All time in range"),
          card("Avg monthly views", avgViews.toLocaleString(), "Per month average"),
          card("Avg view time", "80%", "↑ Consistent all year"),
          card("Hours watched", totalHours+"h", "Total viewing time"),
          card("Fullscreen clicks", totalClicks.toLocaleString(), "Active engagement")
        ),

        // Row 1
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 } },
          chartBox("Video views per month", "Monthly Phyron video views",
            React.createElement(ResponsiveContainer, { width:"100%", height:140 },
              React.createElement(BarChart, { data:filtered, margin:{top:0,right:4,left:-20,bottom:0} },
                React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#222" }),
                React.createElement(XAxis, { dataKey:"m", tick:{fontSize:9,fill:"#666"} }),
                React.createElement(YAxis, { tickFormatter:v=>v>=1000?(v/1000).toFixed(0)+"k":v, tick:{fontSize:9,fill:"#666"} }),
                React.createElement(Tooltip, { content:React.createElement(TT) }),
                React.createElement(Bar, { dataKey:"views", name:"Views", fill:ORANGE, radius:[3,3,0,0] })
              )
            )
          ),
          chartBox("Hours of video watched", "Total viewing time in hours",
            React.createElement(ResponsiveContainer, { width:"100%", height:140 },
              React.createElement(BarChart, { data:filtered, margin:{top:0,right:4,left:-20,bottom:0} },
                React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#222" }),
                React.createElement(XAxis, { dataKey:"m", tick:{fontSize:9,fill:"#666"} }),
                React.createElement(YAxis, { tick:{fontSize:9,fill:"#666"} }),
                React.createElement(Tooltip, { content:React.createElement(TT) }),
                React.createElement(Bar, { dataKey:"hours", name:"Hours", fill:TEAL, radius:[3,3,0,0] })
              )
            )
          )
        ),

        // Row 2
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 } },
          chartBox("Fullscreen clicks per month", "Viewers actively choosing to go fullscreen",
            React.createElement(ResponsiveContainer, { width:"100%", height:140 },
              React.createElement(LineChart, { data:filtered, margin:{top:0,right:4,left:-20,bottom:0} },
                React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#222" }),
                React.createElement(XAxis, { dataKey:"m", tick:{fontSize:9,fill:"#666"} }),
                React.createElement(YAxis, { tick:{fontSize:9,fill:"#666"} }),
                React.createElement(Tooltip, { content:React.createElement(TT) }),
                React.createElement(Line, { type:"monotone", dataKey:"clicks", name:"Clicks", stroke:ORANGE, strokeWidth:2, dot:{r:2,fill:ORANGE} })
              )
            )
          ),
          chartBox("Share clicks per month", "Videos shared by viewers",
            React.createElement(ResponsiveContainer, { width:"100%", height:140 },
              React.createElement(BarChart, { data:filtered, margin:{top:0,right:4,left:-20,bottom:0} },
                React.createElement(CartesianGrid, { strokeDasharray:"3 3", stroke:"#222" }),
                React.createElement(XAxis, { dataKey:"m", tick:{fontSize:9,fill:"#666"} }),
                React.createElement(YAxis, { tick:{fontSize:9,fill:"#666"} }),
                React.createElement(Tooltip, { content:React.createElement(TT) }),
                React.createElement(Bar, { dataKey:"shares", name:"Shares", fill:"#7F77DD", radius:[3,3,0,0] })
              )
            )
          )
        ),

        // Heatmaps
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 } },
          chartBox("When people watch", "Views by time of day — Apr 2026", React.createElement(Heatmap, { data:heatViews, color:"orange" })),
          chartBox("When leads come in", "Leads by time of day — Apr 2026", React.createElement(Heatmap, { data:heatLeads, color:"teal" }))
        ),

        // Footer
        React.createElement('div', { style:{ textAlign:"center", fontSize:11, color:"#444", marginTop:"1.5rem", borderTop:"0.5px solid #1e1e1e", paddingTop:"1rem" } },
          React.createElement('div', null, "Data sourced from Phyron monthly campaign report · April 2026"),
          React.createElement('div', { style:{ marginTop:4, color:ORANGE } }, "Powered by Phyron")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
  </script>
</body>
</html>
